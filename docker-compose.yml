version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: healthcare_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: healthcare_diagnostic
      MYSQL_USER: healthcare_user
      MYSQL_PASSWORD: healthcare_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare_backend
    environment:
      DATABASE_URL: mysql+pymysql://healthcare_user:healthcare_password@mysql:3306/healthcare_diagnostic
      JWT_SECRET_KEY: your-super-secret-jwt-key-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BCRYPT_ROUNDS: 12
      CSRF_SECRET_KEY: your-csrf-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      RATE_LIMIT_PER_MINUTE: 60
      ENVIRONMENT: production
      DEBUG: "false"
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare_network
    volumes:
      - ./backend/ml/models:/app/ml/models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - healthcare_network

volumes:
  mysql_data:

networks:
  healthcare_network:
    driver: bridge
