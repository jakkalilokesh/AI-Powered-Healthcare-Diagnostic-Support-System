services:
  mysql:
    image: mysql:8.0
    container_name: healthcare_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: healthcare_diagnostic
      MYSQL_USER: healthcare_user
      MYSQL_PASSWORD: healthcare_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare_backend
    environment:
      DATABASE_URL: mysql+pymysql://healthcare_user:healthcare_password@mysql:3306/healthcare_diagnostic
      JWT_SECRET_KEY: 223bb87d03b76918f2fec1d7a22fcc3666a82457d9b760194f1b6ff22c51802c
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BCRYPT_ROUNDS: 12
      CSRF_SECRET_KEY: b112248c3e67493ed3bb45b8683c5694fb042f27a7eef5f9a09e7fb7a95f0adc
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      RATE_LIMIT_PER_MINUTE: 60
      ENVIRONMENT: production
      DEBUG: "false"
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare_network
    volumes:
      - ./backend/ml/models:/app/ml/models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - healthcare_network

volumes:
  mysql_data:

networks:
  healthcare_network:
    driver: bridge
